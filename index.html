<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro Cultural - Buscador de Talleres</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <link rel="stylesheet" href="Busqueda.css">
</head>
<body>

    <header>
        <h1>Centro Cultural Comunitario</h1>
        <p>Encuentra el taller ideal para ti</p>
    </header>

    <main id="search-view">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Buscar taller por nombre...">
        </div>
        <div class="workshops-grid" id="workshops-container">
            </div>
    </main>

    <section id="detail-view">
        <button class="back-btn" onclick="showSearchView()">← Volver al buscador</button>
        
        <div class="detail-header">
            <img id="detail-img" src="" alt="Logo del taller">
            <h2 id="detail-title">Nombre del Taller</h2>
            <span id="detail-badge" class="badge">Tipo</span>
            <p><strong id="detail-category">Rubro</strong></p>
        </div>

        <div class="detail-content">
            <div class="info-section">
                <h4>Descripción General</h4>
                <p id="detail-description">Descripción...</p>
            </div>

            <div class="info-section">
                <h4>Actividades</h4>
                <ul id="detail-activities" class="activities-list">
                    </ul>
            </div>

            <div id="dynamic-info" class="info-section">
                </div>

            <div class="contact-info">
                <h4>Contacto</h4>
                <p>📞 Teléfono: <span id="detail-phone"></span></p>
                <p>🌐 Redes: <a href="#" id="detail-social" target="_blank"></a></p>
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script src="Busqueda.js"></script>
</body>
</html>
